<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AUREA - Joyería</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #faf7f2;
            padding-bottom: 80px;
        }

        .header {
            position: sticky;
            top: 0;
            background: linear-gradient(135deg, #f5efe6 0%, #ede5d8 100%);
            padding: 12px 15px;
            box-shadow: 0 2px 12px rgba(100, 60, 20, 0.08);
            z-index: 100;
            border-bottom: 1px solid #e8ddcf;
        }

        .titulo {
           font-size: 24px;
            font-weight: 300;
            text-align: center;
            margin-bottom: 12px;
            color: #8B6914;
            letter-spacing: 3px;
            font-family: 'Times New Roman', Georgia, serif;
        }

        .titulo span {
            font-weight: 600;
            letter-spacing: 5px;
        }

        .buscador {
            margin-bottom: 12px;
        }

        .buscador input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #e0d5c5;
            border-radius: 30px;
            font-size: 14px;
            outline: none;
            background: white;
            transition: all 0.2s;
            color: #4a3728;
        }

        .buscador input:focus {
            border-color: #c9a96b;
            box-shadow: 0 0 0 3px rgba(201, 169, 107, 0.1);
        }

        .buscador input::placeholder {
            color: #c4b5a0;
        }

        .filtros {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .filtros select {
            flex: 1;
            min-width: 120px;
            padding: 10px 8px;
            border: 1px solid #e0d5c5;
            border-radius: 12px;
            background: white;
            font-size: 13px;
            cursor: pointer;
            color: #4a3728;
            transition: all 0.2s;
        }

        .filtros select:focus {
            border-color: #c9a96b;
            outline: none;
        }

        .reset-filtros {
            background: #d4c4b0;
            color: #5c3d2e;
            border: none;
            padding: 10px 15px;
            border-radius: 12px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .reset-filtros:hover {
            background: #c9b698;
            transform: translateY(-1px);
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            font-size: 16px;
            color: #b8a48c;
        }

        .productos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 16px;
            padding: 16px;
        }

        .producto-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 6px 14px rgba(100, 60, 20, 0.08);
            transition: all 0.3s ease;
            cursor: pointer;
            border: 1px solid #f0e8df;
        }

        .producto-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(100, 60, 20, 0.12);
        }

        .producto-card:active {
            transform: scale(0.98);
        }

        .producto-img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            background: #f6f1ea;
            display: block;
        }

        .producto-info {
            padding: 12px;
        }

        .producto-descripcion {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #4a3728;
        }

        .producto-ref {
            font-size: 10px;
            color: #b8a48c;
            margin-bottom: 4px;
        }

        .producto-material {
            font-size: 10px;
            display: inline-block;
            background: #f5efe6;
            color: #8B6914;
            padding: 3px 8px;
            border-radius: 20px;
            margin-bottom: 8px;
        }

        .producto-precio {
            font-size: 16px;
            font-weight: bold;
            color: #8B6914;
            margin: 8px 0;
        }

        .btn-agregar {
            width: 100%;
            background: #e8dccc;
            color: #5c3d2e;
            border: none;
            padding: 8px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-agregar:hover {
            background: #ddceb9;
            transform: translateY(-1px);
        }

        .paginacion {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            padding: 20px 15px;
            flex-wrap: wrap;
        }

        .btn-pagina {
            background: white;
            border: 1px solid #e0d5c5;
            color: #5c3d2e;
            padding: 8px 14px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            min-width: 40px;
            text-align: center;
        }

        .btn-pagina:hover {
            background: #e8dccc;
            border-color: #c9a96b;
        }

        .btn-pagina.activo {
            background: #c9a96b;
            color: white;
            border-color: #c9a96b;
        }

        .btn-pagina:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .info-pagina {
            font-size: 13px;
            color: #b8a48c;
            margin: 0 10px;
        }

        .carrito-flotante {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #c9a96b;
            color: white;
            width: 56px;
            height: 56px;
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 16px rgba(100, 60, 20, 0.25);
            cursor: pointer;
            z-index: 200;
            font-size: 24px;
            transition: all 0.2s;
        }

        .carrito-flotante:active {
            transform: scale(0.92);
        }

        .carrito-contador {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #d4a373;
            color: white;
            border-radius: 30px;
            padding: 2px 7px;
            font-size: 11px;
            font-weight: bold;
            min-width: 20px;
            text-align: center;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(60, 40, 20, 0.6);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-contenido {
            background: white;
            width: 90%;
            max-width: 500px;
            max-height: 80%;
            border-radius: 28px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .modal-header {
            padding: 18px;
            background: #e8dccc;
            color: #5c3d2e;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
        }

        .modal-header button {
            background: none;
            border: none;
            color: #5c3d2e;
            font-size: 28px;
            cursor: pointer;
        }

        .modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .carrito-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f0e8df;
        }

        .carrito-info {
            flex: 1;
        }

        .carrito-nombre {
            font-size: 14px;
            font-weight: 500;
            color: #4a3728;
        }

        .carrito-codigo {
            font-size: 11px;
            color: #b8a48c;
        }

        .carrito-cantidad {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .carrito-cantidad button {
            width: 30px;
            height: 30px;
            border-radius: 15px;
            border: 1px solid #e0d5c5;
            background: white;
            font-weight: bold;
            cursor: pointer;
            color: #5c3d2e;
            transition: all 0.2s;
        }

        .carrito-cantidad button:hover {
            background: #f5efe6;
        }

        .carrito-precio {
            font-weight: bold;
            min-width: 70px;
            text-align: right;
            color: #8B6914;
        }

        .modal-footer {
            padding: 16px;
            border-top: 1px solid #f0e8df;
        }

        .btn-enviar {
            width: 100%;
            background: #c9a96b;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-enviar:hover {
            background: #b88d4a;
            transform: translateY(-1px);
        }

        .btn-vaciar {
            width: 100%;
            background: #e8dccc;
            color: #5c3d2e;
            border: none;
            padding: 12px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 10px;
        }

        .btn-vaciar:hover {
            background: #ddceb9;
        }

        .total {
            text-align: right;
            font-weight: bold;
            margin-bottom: 12px;
            font-size: 18px;
            color: #4a3728;
        }

        .vacio {
            text-align: center;
            color: #c4b5a0;
            padding: 40px;
        }

        .modal-producto {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(60, 40, 20, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-producto-contenido {
            width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .modal-producto-img {
            max-width: 90%;
            max-height: 70%;
            object-fit: contain;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .modal-producto-info {
            background: rgba(245, 239, 230, 0.95);
            padding: 20px;
            border-radius: 28px;
            margin-top: 20px;
            text-align: center;
            max-width: 85%;
            backdrop-filter: blur(10px);
        }

        .modal-producto-info h3 {
            margin-bottom: 6px;
            color: #4a3728;
            font-size: 18px;
        }

        .modal-producto-info p {
            margin: 5px 0;
            font-size: 14px;
            color: #6b4c38;
        }

        .nav-imagenes {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(200, 170, 120, 0.6);
            color: white;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 24px;
            font-size: 28px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            backdrop-filter: blur(4px);
        }

        .nav-imagenes:hover {
            background: rgba(200, 170, 120, 0.9);
        }

        .nav-prev {
            left: 15px;
        }

        .nav-next {
            right: 15px;
        }

        .cerrar-modal-producto {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(200, 170, 120, 0.7);
            color: white;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 22px;
            font-size: 28px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }

        .indicador-imagen {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(60, 40, 20, 0.7);
            color: #f5efe6;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 13px;
            backdrop-filter: blur(4px);
        }

        @media (max-width: 480px) {
            .productos-grid {
                grid-template-columns: repeat(auto-fill, minmax(145px, 1fr));
                gap: 12px;
                padding: 12px;
            }
            .producto-info {
                padding: 10px;
            }
            .btn-pagina {
                padding: 6px 12px;
                font-size: 12px;
                min-width: 38px;
            }
            .titulo {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="titulo">
         <span>AUREA</span> 
    </div>
    <div class="buscador">
        <input type="text" id="buscador" placeholder="🔍 Buscar joyas por nombre o referencia..." autocomplete="off">
    </div>
    <div class="filtros">
        <select id="filtroMaterial">
            <option value="todos">✨ Todos los materiales</option>
            <option value="ACERO">⚜️ Acero (ACE)</option>
            <option value="RODIO">💎 Rodio (ROD)</option>
        </select>
        <select id="filtroCategoria">
            <option value="todos">📿 Todas las categorías</option>
        </select>
        <button class="reset-filtros" id="resetFiltros">🔄 Limpiar</button>
    </div>
</div>

<div id="productosContainer" class="productos-grid">
    <div class="loading">✨ Cargando nuestras joyas... ✨</div>
</div>

<div class="paginacion" id="paginacionContainer"></div>

<div class="carrito-flotante" id="carritoBtn">
    🛒
    <span class="carrito-contador" id="carritoContador">0</span>
</div>

<div id="modalCarrito" class="modal">
    <div class="modal-contenido">
        <div class="modal-header">
            <span>📿 Mi Pedido AUREA</span>
            <button id="cerrarModal">&times;</button>
        </div>
        <div class="modal-body" id="modalBody">
            <div class="vacio">🛍️ Tu carrito está vacío</div>
        </div>
        <div class="modal-footer">
            <div class="total" id="totalCarrito">Total: $0</div>
            <button class="btn-vaciar" id="vaciarCarritoBtn">🗑️ Vaciar carrito</button>
            <button class="btn-enviar" id="enviarPedidoBtn">📱 Enviar pedido por WhatsApp</button>
        </div>
    </div>
</div>

<div id="modalProducto" class="modal-producto">
    <div class="modal-producto-contenido">
        <button class="cerrar-modal-producto" id="cerrarModalProducto">&times;</button>
        <button class="nav-imagenes nav-prev" id="prevImagen">‹</button>
        <img id="modalImagen" class="modal-producto-img" src="" alt="">
        <button class="nav-imagenes nav-next" id="nextImagen">›</button>
        <div class="modal-producto-info" id="modalInfoProducto">
            <h3 id="modalTitulo"></h3>
            <p id="modalRef"></p>
            <p id="modalPrecio"></p>
        </div>
        <div class="indicador-imagen" id="indicadorImagen">1 / 1</div>
    </div>
</div>

<script>
    // ==================== CONFIGURACIÓN ====================
    const NUMERO_WHATSAPP = '573011337774';
    const PRODUCTOS_POR_PAGINA = 10;
    const STORAGE_KEY = 'aurea_carrito';
    
    const FAMILIAS = {
        1: { nombre: "ARETES", madre: null },
        2: { nombre: "CADENAS", madre: null },
        3: { nombre: "PULSERAS", madre: null },
        4: { nombre: "EARCUFFS", madre: null },
        5: { nombre: "SETS", madre: null },
        6: { nombre: "EMBALAJE", madre: null },
        7: { nombre: "CAJAS", madre: 6 },
        8: { nombre: "BOLSAS", madre: 6 },
        9: { nombre: "ANILLOS", madre: null },
        10: { nombre: "ESCLAVAS", madre: 3 },
        11: { nombre: "ARGOLLAS", madre: 1 },
        12: { nombre: "TOPOS", madre: 1 },
        13: { nombre: "CANDONGAS", madre: 1 }
    };
    
    const PREFIJO_MATERIAL = {
        'ACE': 'ACERO',
        'ROD': 'RODIO'
    };
    
    let productos = [];
    let productosFiltrados = [];
    let carrito = {};
    let paginaActual = 1;
    
    let currentProducto = null;
    let currentImages = [];
    let currentImageIndex = 0;
    
    // DOM References
    const productosContainer = document.getElementById('productosContainer');
    const paginacionContainer = document.getElementById('paginacionContainer');
    const buscador = document.getElementById('buscador');
    const filtroMaterial = document.getElementById('filtroMaterial');
    const filtroCategoria = document.getElementById('filtroCategoria');
    const resetFiltros = document.getElementById('resetFiltros');
    const carritoBtn = document.getElementById('carritoBtn');
    const modalCarrito = document.getElementById('modalCarrito');
    const cerrarModal = document.getElementById('cerrarModal');
    const modalBody = document.getElementById('modalBody');
    const carritoContador = document.getElementById('carritoContador');
    const totalCarritoEl = document.getElementById('totalCarrito');
    const enviarPedidoBtn = document.getElementById('enviarPedidoBtn');
    const vaciarCarritoBtn = document.getElementById('vaciarCarritoBtn');
    
    const modalProducto = document.getElementById('modalProducto');
    const cerrarModalProducto = document.getElementById('cerrarModalProducto');
    const modalImagen = document.getElementById('modalImagen');
    const modalTitulo = document.getElementById('modalTitulo');
    const modalRef = document.getElementById('modalRef');
    const modalPrecio = document.getElementById('modalPrecio');
    const prevImagen = document.getElementById('prevImagen');
    const nextImagen = document.getElementById('nextImagen');
    const indicadorImagen = document.getElementById('indicadorImagen');
    
    // ==================== LOCALSTORAGE FUNCTIONS ====================
    
    function guardarCarrito() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(carrito));
    }
    
    function cargarCarrito() {
        const guardado = localStorage.getItem(STORAGE_KEY);
        if (guardado) {
            try {
                carrito = JSON.parse(guardado);
                actualizarContadorCarrito();
            } catch(e) {
                console.error('Error al cargar carrito:', e);
                carrito = {};
            }
        }
    }
    
    function vaciarCarrito() {
        if (Object.keys(carrito).length === 0) return;
        
        if (confirm('¿Estás seguro de que deseas vaciar todo el carrito?')) {
            carrito = {};
            guardarCarrito();
            actualizarContadorCarrito();
            mostrarCarrito();
            mostrarNotificacion('🗑️ Carrito vaciado');
        }
    }
    
    // ==================== FUNCIONES ====================
    
    function obtenerMaterial(referencia) {
        if (!referencia) return 'DESCONOCIDO';
        const prefijo = referencia.split('-')[1].toUpperCase();
        return PREFIJO_MATERIAL[prefijo] || 'OTRO';
    }
    
    function obtenerNombreCategoria(codfamilia) {
        if (!codfamilia) return 'General';
        const familia = FAMILIAS[codfamilia];
        return familia ? familia.nombre : `Familia ${codfamilia}`;
    }
    
    function obtenerCategoriaPrincipal(codfamilia) {
        let actual = FAMILIAS[codfamilia];
        if (!actual) return 'General';
        while (actual.madre && FAMILIAS[actual.madre]) {
            actual = FAMILIAS[actual.madre];
        }
        return actual.nombre;
    }
    
    async function imagenExiste(url) {
        return new Promise((resolve) => {
            const img = new Image();
            img.onload = () => resolve(true);
            img.onerror = () => resolve(false);
            img.src = url;
        });
    }
    
    async function obtenerImagenesProducto(referencia) {
        const imagenes = [];
        const extensiones = ['jpg', 'jpeg', 'png', 'webp'];
        
        for (const ext of extensiones) {
            const url = `imagenes/${referencia}.${ext}`;
            const existe = await imagenExiste(url);
            if (existe) {
                imagenes.push(url);
                break;
            }
        }
        
        let i = 1;
        while (i <= 20) {
            let encontrada = false;
            for (const ext of extensiones) {
                const url = `imagenes/${referencia}_${i}.${ext}`;
                const existe = await imagenExiste(url);
                if (existe) {
                    imagenes.push(url);
                    encontrada = true;
                    break;
                }
            }
            if (!encontrada) break;
            i++;
        }
        
        if (imagenes.length === 0) {
            imagenes.push('https://placehold.co/400x400/E8DCCC/8B6914?text=AUREA&font=montserrat');
        }
        
        return imagenes;
    }
    
    async function cargarProductos() {
        try {
            const csvUrl = 'data/productos.csv';
            const response = await fetch(csvUrl);
            if (!response.ok) throw new Error(`No se pudo cargar ${csvUrl}`);
            const csvText = await response.text();
            
            const lineas = csvText.trim().split('\n');
            const encabezados = lineas[0].split(',').map(h => h.trim().toLowerCase());
            
            const idxReferencia = encabezados.indexOf('referencia');
            const idxDescripcion = encabezados.indexOf('descripcion');
            const idxFamilia = encabezados.indexOf('codfamilia');
            const idxPrecio = encabezados.indexOf('precio');
            const idxDisponible = encabezados.indexOf('disponible');
            
            if (idxReferencia === -1) throw new Error('Columna referencia no encontrada');
            
            productos = [];
            for (let i = 1; i < lineas.length; i++) {
                const valores = lineas[i].split(',').map(v => v.trim());
                if (valores.length < encabezados.length) continue;
                
                const referencia = valores[idxReferencia];
                if (!referencia) continue;
                
                 // Leer cantidad (stock)
                let cantidad = 1; // valor por defecto
                if (idxDisponible !== -1) {
                    cantidad = parseInt(valores[idxDisponible]);
                    if (isNaN(cantidad)) cantidad = 0;
                }
                
                // SOLO mostrar productos con cantidad >= 1
                if (cantidad < 1) continue;
                
                const producto = {
                    referencia: referencia,
                    descripcion: idxDescripcion !== -1 ? valores[idxDescripcion] : 'Sin descripción',
                    codfamilia: idxFamilia !== -1 ? parseInt(valores[idxFamilia]) : null,
                    precio: idxPrecio !== -1 ? parseFloat(valores[idxPrecio]) : 0
                };
                
                producto.material = obtenerMaterial(referencia);
                producto.categoria = obtenerNombreCategoria(producto.codfamilia);
                producto.categoriaPrincipal = obtenerCategoriaPrincipal(producto.codfamilia);
                
                if (!isNaN(producto.precio) && producto.precio > 0) {
                    productos.push(producto);
                }
            }
            
            const categorias = [...new Set(productos.map(p => p.categoriaPrincipal).filter(c => c && c !== 'General'))];
            filtroCategoria.innerHTML = '<option value="todos">📿 Todas las categorías</option>';
            categorias.sort().forEach(cat => {
                filtroCategoria.innerHTML += `<option value="${cat}">${cat}</option>`;
            });
            
            aplicarFiltros();
            
        } catch (error) {
            console.error(error);
            productosContainer.innerHTML = `<div class="loading">❌ Error al cargar: ${error.message}<br><br>💎 Asegúrate que el archivo existe en: data/productos.csv</div>`;
            paginacionContainer.innerHTML = '';
        }
    }
    
    function aplicarFiltros() {
        const materialSel = filtroMaterial.value;
        const categoriaSel = filtroCategoria.value;
        const busqueda = buscador.value.toLowerCase().trim();
        
        let filtrados = [...productos];
        
        if (materialSel !== 'todos') {
            filtrados = filtrados.filter(p => p.material === materialSel);
        }
        
        if (categoriaSel !== 'todos') {
            filtrados = filtrados.filter(p => p.categoriaPrincipal === categoriaSel);
        }
        
        if (busqueda) {
            filtrados = filtrados.filter(p => 
                p.descripcion.toLowerCase().includes(busqueda) || 
                p.referencia.toLowerCase().includes(busqueda)
            );
        }
        
        productosFiltrados = filtrados;
        paginaActual = 1;
        renderizarPaginacion();
        renderizarProductos();
    }
    
    function renderizarPaginacion() {
        const totalProductos = productosFiltrados.length;
        const totalPaginas = Math.ceil(totalProductos / PRODUCTOS_POR_PAGINA);
        
        if (totalPaginas <= 1) {
            paginacionContainer.innerHTML = '';
            return;
        }
        
        let html = '';
        html += `<button class="btn-pagina" onclick="cambiarPagina(${paginaActual - 1})" ${paginaActual === 1 ? 'disabled' : ''}>‹ Anterior</button>`;
        
        const inicio = Math.max(1, paginaActual - 2);
        const fin = Math.min(totalPaginas, paginaActual + 2);
        
        if (inicio > 1) {
            html += `<button class="btn-pagina" onclick="cambiarPagina(1)">1</button>`;
            if (inicio > 2) html += `<span class="info-pagina">...</span>`;
        }
        
        for (let i = inicio; i <= fin; i++) {
            html += `<button class="btn-pagina ${i === paginaActual ? 'activo' : ''}" onclick="cambiarPagina(${i})">${i}</button>`;
        }
        
        if (fin < totalPaginas) {
            if (fin < totalPaginas - 1) html += `<span class="info-pagina">...</span>`;
            html += `<button class="btn-pagina" onclick="cambiarPagina(${totalPaginas})">${totalPaginas}</button>`;
        }
        
        html += `<button class="btn-pagina" onclick="cambiarPagina(${paginaActual + 1})" ${paginaActual === totalPaginas ? 'disabled' : ''}>Siguiente ›</button>`;
        html += `<span class="info-pagina">✨ ${productosFiltrados.length} joyas | Pág ${paginaActual} de ${totalPaginas}</span>`;
        
        paginacionContainer.innerHTML = html;
    }
    
    function cambiarPagina(pagina) {
        const totalPaginas = Math.ceil(productosFiltrados.length / PRODUCTOS_POR_PAGINA);
        if (pagina < 1 || pagina > totalPaginas) return;
        paginaActual = pagina;
        renderizarPaginacion();
        renderizarProductos();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    
    function renderizarProductos() {
        const inicio = (paginaActual - 1) * PRODUCTOS_POR_PAGINA;
        const fin = inicio + PRODUCTOS_POR_PAGINA;
        const productosPagina = productosFiltrados.slice(inicio, fin);
        
        if (productosPagina.length === 0) {
            productosContainer.innerHTML = '<div class="loading">📭 No hay joyas con esos filtros</div>';
            return;
        }
        
        productosContainer.innerHTML = productosPagina.map(producto => `
            <div class="producto-card" data-ref="${producto.referencia}">
                <img class="producto-img" 
                     src="imagenes/${producto.referencia}.jpg" 
                     alt="${producto.descripcion}"
                     onerror="this.src='https://placehold.co/400x400/E8DCCC/8B6914?text=AUREA&font=montserrat'"
                     loading="lazy">
                <div class="producto-info">
                    <div class="producto-descripcion">${escapeHtml(producto.descripcion.substring(0, 35))}</div>
                    <div class="producto-ref">Ref: ${escapeHtml(producto.referencia)}</div>
                    <div class="producto-material">${producto.material === 'ACERO' ? '⚜️ Acero' : '💎 Rodio'}</div>
                    <div class="producto-precio">$${producto.precio.toLocaleString('es-CO')}</div>
                    <button class="btn-agregar" 
                            data-ref="${producto.referencia}"
                            data-nombre="${escapeHtml(producto.descripcion)}"
                            data-precio="${producto.precio}"
                            data-material="${producto.material}">
                        ✨ Agregar
                    </button>
                </div>
            </div>
        `).join('');
        
        document.querySelectorAll('.producto-card').forEach(card => {
            card.addEventListener('click', (e) => {
                if (e.target.classList.contains('btn-agregar')) return;
                const ref = card.dataset.ref;
                abrirModalProducto(ref);
            });
        });
        
        document.querySelectorAll('.btn-agregar').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const ref = btn.dataset.ref;
                const nombre = btn.dataset.nombre;
                const precio = parseFloat(btn.dataset.precio);
                const material = btn.dataset.material;
                agregarAlCarrito(ref, nombre, precio, material);
            });
        });
    }
    
    async function abrirModalProducto(referencia) {
        const producto = productos.find(p => p.referencia === referencia);
        if (!producto) return;
        
        currentProducto = producto;
        currentImages = await obtenerImagenesProducto(referencia);
        currentImageIndex = 0;
        
        actualizarModalImagen();
        
        modalTitulo.textContent = producto.descripcion;
        modalRef.textContent = `Referencia: ${producto.referencia} | ${producto.material === 'ACERO' ? '⚜️ Acero' : '💎 Rodio'}`;
        modalPrecio.textContent = `Precio: $${producto.precio.toLocaleString('es-CO')}`;
        
        modalProducto.style.display = 'flex';
    }
    
    function actualizarModalImagen() {
        if (currentImages.length > 0) {
            modalImagen.src = currentImages[currentImageIndex];
            indicadorImagen.textContent = `${currentImageIndex + 1} / ${currentImages.length}`;
        }
        prevImagen.style.display = currentImages.length > 1 ? 'flex' : 'none';
        nextImagen.style.display = currentImages.length > 1 ? 'flex' : 'none';
    }
    
    function cambiarImagen(direccion) {
        if (currentImages.length === 0) return;
        currentImageIndex += direccion;
        if (currentImageIndex < 0) currentImageIndex = currentImages.length - 1;
        if (currentImageIndex >= currentImages.length) currentImageIndex = 0;
        actualizarModalImagen();
    }
    
    function agregarAlCarrito(ref, nombre, precio, material) {
        if (!carrito[ref]) {
            carrito[ref] = { 
                cantidad: 1, 
                nombre: nombre, 
                precio: precio, 
                material: material
            };
        } else {
            carrito[ref].cantidad++;
        }
        guardarCarrito();
        actualizarContadorCarrito();
        mostrarNotificacion(`✨ +1: ${nombre.substring(0, 20)}`);
    }
    
    function actualizarContadorCarrito() {
        const totalItems = Object.values(carrito).reduce((sum, item) => sum + item.cantidad, 0);
        carritoContador.textContent = totalItems;
    }
    
    function mostrarCarrito() {
        const body = modalBody;
        const items = Object.entries(carrito);
        
        if (items.length === 0) {
            body.innerHTML = '<div class="vacio">🛍️ Tu carrito AUREA está vacío</div>';
            totalCarritoEl.textContent = 'Total: $0';
            modalCarrito.style.display = 'flex';
            return;
        }
        
        let totalGeneral = 0;
        body.innerHTML = items.map(([ref, item]) => {
            const subtotal = item.cantidad * item.precio;
            totalGeneral += subtotal;
            return `
                <div class="carrito-item">
                    <div class="carrito-info">
                        <div class="carrito-nombre">${escapeHtml(item.nombre.substring(0, 30))}</div>
                        <div class="carrito-codigo">Ref: ${ref} | ${item.material === 'ACERO' ? '⚜️ Acero' : '💎 Rodio'}</div>
                    </div>
                    <div class="carrito-cantidad">
                        <button onclick="modificarCantidad('${ref}', -1)">-</button>
                        <span>${item.cantidad}</span>
                        <button onclick="modificarCantidad('${ref}', 1)">+</button>
                    </div>
                    <div class="carrito-precio">$${(subtotal).toLocaleString('es-CO')}</div>
                </div>
            `;
        }).join('');
        
        totalCarritoEl.textContent = `Total: $${totalGeneral.toLocaleString('es-CO')}`;
        modalCarrito.style.display = 'flex';
    }
    
    window.modificarCantidad = function(ref, delta) {
        if (carrito[ref]) {
            const nuevaCant = carrito[ref].cantidad + delta;
            if (nuevaCant <= 0) {
                delete carrito[ref];
            } else {
                carrito[ref].cantidad = nuevaCant;
            }
            guardarCarrito();
            actualizarContadorCarrito();
            mostrarCarrito();
        }
    };
    
    function enviarPedido() {
        if (Object.keys(carrito).length === 0) {
            alert('📭 Agrega joyas al carrito primero');
            return;
        }
        
        let mensaje = '*✨ AUREA - NUEVO PEDIDO ✨*%0A%0A';
        mensaje += '*Productos solicitados:*%0A';
        
        for (const [ref, item] of Object.entries(carrito)) {
            const materialIcon = item.material === 'ACERO' ? '⚜️' : '💎';
            mensaje += `• *${ref}* ${materialIcon} ${item.material === 'ACERO' ? 'Acero' : 'Rodio'} - Cant: ${item.cantidad}%0A`;
        }
        
        const totalItems = Object.values(carrito).reduce((s, i) => s + i.cantidad, 0);
        mensaje += `%0A📦 *Total de unidades:* ${totalItems}`;
        mensaje += `%0A%0A🌟 ¡Hola, Quiero esto! 🌟`;
        
        const url = `https://wa.me/${NUMERO_WHATSAPP}?text=${mensaje}`;
        window.open(url, '_blank');
    }
    
    function resetearFiltros() {
        filtroMaterial.value = 'todos';
        filtroCategoria.value = 'todos';
        buscador.value = '';
        aplicarFiltros();
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function mostrarNotificacion(msg) {
        const toast = document.createElement('div');
        toast.textContent = msg;
        toast.style.position = 'fixed';
        toast.style.bottom = '80px';
        toast.style.left = '50%';
        toast.style.transform = 'translateX(-50%)';
        toast.style.background = '#c9a96b';
        toast.style.color = 'white';
        toast.style.padding = '10px 20px';
        toast.style.borderRadius = '40px';
        toast.style.fontSize = '13px';
        toast.style.zIndex = '300';
        toast.style.boxShadow = '0 4px 12px rgba(100,60,20,0.2)';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }
    
    // ==================== EVENTOS ====================
    buscador.addEventListener('input', aplicarFiltros);
    filtroMaterial.addEventListener('change', aplicarFiltros);
    filtroCategoria.addEventListener('change', aplicarFiltros);
    resetFiltros.addEventListener('click', resetearFiltros);
    carritoBtn.addEventListener('click', mostrarCarrito);
    cerrarModal.addEventListener('click', () => modalCarrito.style.display = 'none');
    enviarPedidoBtn.addEventListener('click', enviarPedido);
    vaciarCarritoBtn.addEventListener('click', vaciarCarrito);
    
    cerrarModalProducto.addEventListener('click', () => modalProducto.style.display = 'none');
    prevImagen.addEventListener('click', () => cambiarImagen(-1));
    nextImagen.addEventListener('click', () => cambiarImagen(1));
    
    window.addEventListener('click', (e) => {
        if (e.target === modalCarrito) modalCarrito.style.display = 'none';
        if (e.target === modalProducto) modalProducto.style.display = 'none';
    });
    
    window.addEventListener('keydown', (e) => {
        if (modalProducto.style.display === 'flex') {
            if (e.key === 'ArrowLeft') cambiarImagen(-1);
            if (e.key === 'ArrowRight') cambiarImagen(1);
            if (e.key === 'Escape') modalProducto.style.display = 'none';
        }
    });
    
    window.cambiarPagina = cambiarPagina;
    
    // ==================== INICIALIZAR ====================
    cargarCarrito();
    cargarProductos();
</script>
</body>
</html>
